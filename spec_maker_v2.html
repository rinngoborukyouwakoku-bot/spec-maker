
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホワイトボード風スペック表メーカー v2</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1250px;
            width: 100%;
        }

        /* 入力パネル */
        .input-panel {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        /* プレビューパネル */
        .preview-panel {
            flex: 1.2;
            position: sticky;
            top: 20px;
        }

        canvas {
            width: 100%;
            height: auto;
            border: 12px solid #ccc;
            border-radius: 8px;
            background-color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.2em; }
        
        .form-group { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.85em; color: #555; }
        
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9em;
        }

        .row-tool { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
        .btn-add { background: #4caf50; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8em; transition: 0.2s; }
        .btn-add:hover { background: #43a047; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        
        .btn-reset { 
            position: absolute; top: 20px; right: 20px; 
            background: #78909c; color: white; border: none; 
            padding: 6px 14px; border-radius: 4px; cursor: pointer; 
            font-size: 0.8em; font-weight: bold;
        }
        .btn-reset:hover { background: #546e7a; }

        .btn-download { 
            width: 100%; background: #1976d2; color: white; border: none; 
            padding: 18px; border-radius: 10px; cursor: pointer; 
            font-size: 1.1em; margin-top: 20px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(25, 118, 210, 0.3);
            transition: 0.2s;
        }
        .btn-download:hover { background: #1565c0; transform: translateY(-1px); }
        
        .soc-shortcuts { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        .btn-chip { background: #eceff1; border: 1px solid #cfd8dc; padding: 4px 10px; border-radius: 15px; font-size: 0.75em; cursor: pointer; color: #455a64; }
        .btn-chip:hover { background: #cfd8dc; }

        .item-list { margin-bottom: 8px; }
        .item-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- 入力パネル -->
    <div class="input-panel" id="inputForm">
        <button class="btn-reset" onclick="resetText()">文字リセット</button>
        <h2>ホワイトボード・スペック表制作</h2>
        
        <div class="form-group">
            <label>商品名</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="productName" placeholder="例: POCO F6 Pro" oninput="draw()">
                <input type="color" id="productHeaderColor" value="#ffcc80" title="文字背景色" oninput="draw()">
            </div>
        </div>

        <div class="form-group">
            <label>SOC (チップセット)</label>
            <div class="soc-shortcuts">
                <button class="btn-chip" onclick="setSoc('Snapdragon ')">Snapdragon</button>
                <button class="btn-chip" onclick="setSoc('MediaTek Dimensity ')">Dimensity</button>
                <button class="btn-chip" onclick="setSoc('Apple A')">Apple A</button>
                <button class="btn-chip" onclick="setSoc('Google Tensor ')">Tensor</button>
                <button class="btn-chip" onclick="setSoc('Exynos ')">Exynos</button>
            </div>
            <input type="text" id="soc" placeholder="Snapdragon 8 Gen 2" oninput="draw()">
        </div>

        <div class="form-group">
            <label>RAM、ROM</label>
            <div id="ramromList" class="item-list"></div>
            <button class="btn-add" onclick="addItem('ramrom')">＋ バリエーション追加</button>
        </div>

        <div class="form-group">
            <label>ディスプレイ</label>
            <div id="displayList" class="item-list"></div>
            <button class="btn-add" onclick="addItem('display')">＋ ディスプレイ追加</button>
        </div>

        <div class="form-group">
            <label>バッテリー</label>
            <div class="row-tool">
                <input type="text" id="batteryCap" placeholder="5000" style="width:40%" oninput="draw()"> <span style="font-size:0.8em">mAh /</span>
                <input type="text" id="batteryWatt" placeholder="120" style="width:30%" oninput="draw()"> <span style="font-size:0.8em">W</span>
            </div>
        </div>

        <div class="form-group">
            <label>カメラ</label>
            <div id="cameraList" class="item-list"></div>
            <button class="btn-add" onclick="addItem('camera')">＋ カメラ追加</button>
        </div>

        <div class="form-group">
            <label>生体認証</label>
            <div id="authList" class="item-list"></div>
            <button class="btn-add" onclick="addItem('auth')">＋ 項目追加</button>
        </div>

        <div class="form-group" style="border:none;">
            <label>OS</label>
            <input type="text" id="os" placeholder="HyperOS (Android 14)" oninput="draw()">
        </div>
    </div>

    <!-- プレビューパネル -->
    <div class="preview-panel">
        <canvas id="specCanvas" width="1280" height="720"></canvas>
        <button class="btn-download" onclick="downloadImage()">画像として保存 (16:9 PNG)</button>
        <p style="font-size: 0.8em; color: #888; text-align: center; margin-top: 10px;">
            ※文字は自動的に「外縁黒・内側白」で描画されます。
        </p>
    </div>
</div>

<script>
    const canvas = document.getElementById('specCanvas');
    const ctx = canvas.getContext('2d');

    // データの初期化（前回の保存データがあれば読み込む）
    let appData = JSON.parse(localStorage.getItem('specMakerDataV2')) || {
        productName: "POCO F6 Pro",
        headerColor: "#ffcc80",
        soc: "Snapdragon 8 Gen 2",
        ramrom: ["256GB - 12GB", "512GB - 12GB"],
        displays: [{size: "6.67", type: "OLED", hz: "120"}],
        battery: {cap: "5000", watt: "120"},
        cameras: [{name: "メイン", mp: "50"}, {name: "超広角", mp: "8"}, {name: "マクロ", mp: "2"}],
        auths: ["顔認証", "画面内指紋認証"],
        os: "HyperOS (Android 14)"
    };

    function save() {
        localStorage.setItem('specMakerDataV2', JSON.stringify(appData));
    }

    function setSoc(text) {
        document.getElementById('soc').value = text;
        appData.soc = text;
        draw();
    }

    function addItem(type) {
        if(type === 'ramrom') appData.ramrom.push("");
        if(type === 'display') appData.displays.push({size: "", type: "OLED", hz: ""});
        if(type === 'camera') appData.cameras.push({name: "", mp: ""});
        if(type === 'auth') appData.auths.push("");
        refreshForm();
        draw();
    }

    function removeItem(type, index) {
        if(type === 'ramrom') appData.ramrom.splice(index, 1);
        if(type === 'display') appData.displays.splice(index, 1);
        if(type === 'camera') appData.cameras.splice(index, 1);
        if(type === 'auth') appData.auths.splice(index, 1);
        refreshForm();
        draw();
    }

    function resetText() {
        if(!confirm("入力されたテキスト情報をすべて消去しますか？（色などの設定は維持されます）")) return;
        appData.productName = "";
        appData.soc = "";
        appData.ramrom = [""];
        appData.displays = [{size: "", type: "OLED", hz: ""}];
        appData.battery = {cap: "", watt: ""};
        appData.cameras = [{name: "", mp: ""}];
        appData.auths = [""];
        appData.os = "";
        refreshForm();
        draw();
    }

    function refreshForm() {
        document.getElementById('productName').value = appData.productName;
        document.getElementById('productHeaderColor').value = appData.headerColor;
        document.getElementById('soc').value = appData.soc;
        document.getElementById('batteryCap').value = appData.battery.cap;
        document.getElementById('batteryWatt').value = appData.battery.watt;
        document.getElementById('os').value = appData.os;

        // RAMROM
        const rrList = document.getElementById('ramromList');
        rrList.innerHTML = '';
        appData.ramrom.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `<input type="text" value="${v}" oninput="appData.ramrom[${i}]=this.value;draw()" placeholder="例: 256GB - 12GB">
                             <button class="btn-del" onclick="removeItem('ramrom', ${i})">×</button>`;
            rrList.appendChild(div);
        });

        // Display
        const dList = document.getElementById('displayList');
        dList.innerHTML = '';
        appData.displays.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" value="${v.size}" style="width:30%" oninput="appData.displays[${i}].size=this.value;draw()" placeholder="インチ">
                <select onchange="appData.displays[${i}].type=this.value;draw()">
                    <option value="OLED" ${v.type==='OLED'?'selected':''}>OLED</option>
                    <option value="液晶" ${v.type==='液晶'?'selected':''}>液晶</option>
                </select>
                <input type="text" value="${v.hz}" style="width:30%" oninput="appData.displays[${i}].hz=this.value;draw()" placeholder="Hz">
                <button class="btn-del" onclick="removeItem('display', ${i})">×</button>
            `;
            dList.appendChild(div);
        });

        // Camera
        const cList = document.getElementById('cameraList');
        cList.innerHTML = '';
        appData.cameras.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" value="${v.name}" style="width:50%" oninput="appData.cameras[${i}].name=this.value;draw()" placeholder="メイン">
                <input type="text" value="${v.mp}" style="width:40%" oninput="appData.cameras[${i}].mp=this.value;draw()" placeholder="画素数(MP)">
                <button class="btn-del" onclick="removeItem('camera', ${i})">×</button>
            `;
            cList.appendChild(div);
        });

        // Auth
        const aList = document.getElementById('authList');
        aList.innerHTML = '';
        appData.auths.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `<input type="text" value="${v}" oninput="appData.auths[${i}]=this.value;draw()" placeholder="認証方法">
                             <button class="btn-del" onclick="removeItem('auth', ${i})">×</button>`;
            aList.appendChild(div);
        });
    }

    function draw() {
        // 現在の値をデータに同期
        appData.productName = document.getElementById('productName').value;
        appData.headerColor = document.getElementById('productHeaderColor').value;
        appData.soc = document.getElementById('soc').value;
        appData.battery.cap = document.getElementById('batteryCap').value;
        appData.battery.watt = document.getElementById('batteryWatt').value;
        appData.os = document.getElementById('os').value;
        save();

        // 描画リセット
        ctx.fillStyle = "#fafafa";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ホワイトボードの小物（トレイ）
        ctx.fillStyle = "#ced4da";
        ctx.fillRect(950, 690, 300, 20);
        ctx.fillStyle = "#343a40";
        ctx.fillRect(1000, 685, 90, 15); // イレーザー

        const startX = 50;
        let currentY = 85;

        // 共通テキストスタイル (外縁黒・内側白)
        const setupTextStyle = (size, isBold = true) => {
            ctx.font = `${isBold ? 'bold' : ''} ${size}px 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif`;
            ctx.lineWidth = size / 8; // 文字サイズに合わせた縁の太さ
            ctx.strokeStyle = "black";
            ctx.lineJoin = "round";
            ctx.fillStyle = "white";
            ctx.textAlign = "left";
        };

        const renderText = (text, x, y) => {
            ctx.strokeText(text, x, y);
            ctx.fillText(text, x, y);
        };

        // 1. 商品名（背景色付き、他より大きい）
        if(appData.productName) {
            setupTextStyle(65);
            const textMetrics = ctx.measureText(appData.productName);
            
            // 背景色の四角を描画
            ctx.fillStyle = appData.headerColor;
            ctx.fillRect(startX - 10, currentY - 60, textMetrics.width + 20, 80);
            
            // 再設定して描画
            setupTextStyle(65);
            renderText(appData.productName, startX, currentY);
        }
        currentY += 105;

        // 2. SOC
        if(appData.soc) {
            setupTextStyle(45);
            renderText(`SOC: ${appData.soc}`, startX, currentY);
            currentY += 80;
        }

        // 3. RAM ROM
        const rrFiltered = appData.ramrom.filter(v => v.trim() !== "");
        if(rrFiltered.length > 0) {
            setupTextStyle(45);
            renderText(`RAM、ROM: ${rrFiltered.join(" / ")}`, startX, currentY);
            currentY += 80;
        }

        // 4. Display
        const dFiltered = appData.displays.filter(d => d.size || d.hz);
        if(dFiltered.length > 0) {
            setupTextStyle(45);
            const dText = dFiltered.map(d => `${d.size}インチ(${d.type}) ${d.hz}Hz`).join(" / ");
            renderText(`ディスプレイ: ${dText}`, startX, currentY);
            currentY += 80;
        }

        // 5. Battery
        if(appData.battery.cap || appData.battery.watt) {
            setupTextStyle(45);
            renderText(`バッテリー: ${appData.battery.cap}mAh(${appData.battery.watt}W)`, startX, currentY);
            currentY += 80;
        }

        // 6. Camera
        const cFiltered = appData.cameras.filter(c => c.name || c.mp);
        if(cFiltered.length > 0) {
            setupTextStyle(45);
            const cText = cFiltered.map(c => `${c.name} ${c.mp}MP`).join(" / ");
            renderText(`カメラ: ${cText}`, startX, currentY);
            currentY += 80;
        }

        // 7. Auth
        const aFiltered = appData.auths.filter(v => v.trim() !== "");
        if(aFiltered.length > 0) {
            setupTextStyle(45);
            renderText(`生体認証: ${aFiltered.join(" / ")}`, startX, currentY);
            currentY += 80;
        }

        // 8. OS
        if(appData.os) {
            setupTextStyle(45);
            renderText(`OS: ${appData.os}`, startX, currentY);
        }
    }

    function downloadImage() {
        const link = document.createElement('a');
        const name = appData.productName || 'spec';
        link.download = `${name}_spec_sheet.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // 初期起動
    refreshForm();
    draw();
</script>

</body>
</html>
